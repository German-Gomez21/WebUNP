<section class="news-detail" *ngIf="!loading() && noticia() as item; else loadingTpl">
  <div class="container">
    <nav class="breadcrumb" aria-label="Ruta de navegación">
      <a routerLink="/" class="breadcrumb__link">Inicio</a>
      <span aria-hidden="true">/</span>
      <a routerLink="/noticias" class="breadcrumb__link">Noticias</a>
      <span aria-hidden="true">/</span>
      <span class="breadcrumb__current">{{ item.titulo }}</span>
    </nav>

    <article class="news-detail__article">
      <header class="news-detail__header">
        <p class="news-detail__eyebrow">{{ item.categoria }}</p>
        <h1 class="news-detail__title">{{ item.titulo }}</h1>
        <p class="news-detail__subtitle">{{ item.subtitulo }}</p>
        <div class="news-detail__meta">
          <span *ngIf="item.autor">Por {{ item.autor }}</span>
          <time [attr.datetime]="item.fecha">{{ item.fecha | date:'dd MMM yyyy':'':'es' }}</time>
        </div>
      </header>

      <img [src]="item.imagen || fallbackImage" [alt]="item.titulo" class="news-detail__image" width="1200" height="675" fetchpriority="high" loading="eager" decoding="async" (error)="onImageError($event)" />

      <div class="news-detail__content" [innerHTML]="item.contenidoHtml"></div>

      <div class="news-detail__tags" *ngIf="item.etiquetas?.length">
        <span class="news-detail__tag" *ngFor="let etiqueta of item.etiquetas">{{ etiqueta }}</span>
      </div>

      <div class="news-detail__back">
        <a routerLink="/noticias" class="news-detail__back-link">← Volver a noticias</a>
      </div>
    </article>

    <aside class="news-detail__related" *ngIf="relacionadas().length">
      <h2 class="news-detail__related-title">Noticias relacionadas</h2>
      <div class="news-detail__related-list">
        <a class="news-detail__related-item" *ngFor="let relacionada of relacionadas()" [routerLink]="['/noticias', relacionada.slug]">
          <h3>{{ relacionada.titulo }}</h3>
          <p>{{ relacionada.resumen }}</p>
        </a>
      </div>
    </aside>
  </div>
</section>

<ng-template #loadingTpl>
  <section class="news-detail news-detail--loading">
    <div class="container">
      <div class="news-card-skeleton"></div>
    </div>
  </section>
</ng-template>
