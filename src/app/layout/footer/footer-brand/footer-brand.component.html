<div class="footer__brand">
    <a href="/" class="footer__logo-link" aria-label="Ir a la página de inicio">
        <img [src]="brandData().logoPath" 
             [alt]="brandData().logoAlt" 
             class="footer__logo">
    </a>
    <p class="footer__description">
        {{ brandData().description }}
    </p>
</div>
