<div class="footer__column footer__column--{{ columnType() }}">
    <h4 class="footer__title">{{ title() }}</h4>
    <ul class="footer__links">
        @for (link of links(); track link.nombre) {
            <app-footer-link 
                [link]="link"
                (linkClicked)="onLinkClick($event)" />
        }
    </ul>
</div>
